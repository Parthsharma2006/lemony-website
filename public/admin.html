<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lemonyy - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 100px auto 50px;
            padding: 2rem;
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 2rem;
        }
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #edf2f7;
        }
        th {
            background-color: var(--light);
            font-weight: 800;
            color: var(--dark);
        }
        tr:hover {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">🍋 Lemonyy Admin</div>
        <ul class="nav-links">
            <li><a href="index.html">Back to Website</a></li>
        </ul>
    </nav>

    <div class="admin-container">
        <h2>Customer Orders</h2>
        <p>Review the names, phone numbers, and orders placed on your website here.</p>
        
        <table id="orders-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Name</th>
                    <th>Phone Number</th>
                    <th>Item</th>
                    <th>Quantity</th>
                    <th>Total Price</th>
                </tr>
            </thead>
            <tbody id="orders-body">
                <tr><td colspan="6" style="text-align: center;">Loading orders...</td></tr>
            </tbody>
        </table>
    </div>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const q = query(collection(db, "orders"), orderBy("date", "desc"));
                const querySnapshot = await getDocs(q);
                const orders = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                const tbody = document.getElementById('orders-body');
                
                if (orders.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">No orders yet.</td></tr>';
                    return;
                }
                
                tbody.innerHTML = orders.map(order => `
                    <tr>
                        <td>${new Date(order.date).toLocaleString()}</td>
                        <td><strong>${order.name}</strong></td>
                        <td>${order.phone}</td>
                        <td>${order.item}</td>
                        <td>${order.quantity}</td>
                        <td>₹${order.totalPrice}</td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Failed to load orders', error);
                document.getElementById('orders-body').innerHTML = '<tr><td colspan="6" style="text-align: center; color: red;">Error loading orders. Did you set up Firebase rules and update firebase-config.js?</td></tr>';
            }
        });
    </script>
</body>
</html>
